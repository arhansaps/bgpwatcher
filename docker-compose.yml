services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LOG_RETENTION_HOURS=6
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  ingestor:
    build: ./ingestor
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bgpwatch
      - POSTGRES_PASSWORD=bgpwatch
      - POSTGRES_DB=bgpwatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./state/init.sql:/docker-entrypoint-initdb.d/init.sql

  state:
    build: ./state
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - POSTGRES_DSN=postgresql://bgpwatch:bgpwatch@postgres:5432/bgpwatch
    restart: on-failure

  detector:
    build: ./detector
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - POSTGRES_DSN=postgresql://bgpwatch:bgpwatch@postgres:5432/bgpwatch
      - MODEL_PATH=/app/model.joblib
    volumes:
      - ./detector/model.joblib:/app/model.joblib:ro
    restart: on-failure

volumes:
  kafka_data:
  redis_data:
  postgres_data:
